<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>reflector — laboratório de canais</title>
<style>
  :root {
    --bg: #0f1419; --panel: #161b22; --border: #2d333b; --text: #e6edf3;
    --muted: #8b949e; --accent: #58a6ff; --ok: #3fb950; --warn: #d29922; --err: #f85149;
    --ch-whatsapp: #25d366; --ch-discord: #5865f2; --ch-teams: #7b83eb; --ch-slack: #e01e5a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.5 ui-monospace, "Cascadia Code", Menlo, monospace; }
  header { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 2; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0; white-space: nowrap; }
  header h1 span { color: var(--muted); font-weight: normal; }
  header .spacer { flex: 1; }
  label.toggle { color: var(--muted); cursor: pointer; user-select: none; white-space: nowrap; }
  button { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; cursor: pointer; font: inherit; }
  button:hover { border-color: var(--accent); }
  nav.channels { display: flex; gap: 4px; }
  nav.channels .tab { padding: 3px 14px; font-size: 12px; border-radius: 12px; transition: border-color .15s, color .15s; }
  nav.channels .tab.active { font-weight: 600; }
  nav.channels .tab[data-channel=""].active { border-color: var(--muted); color: var(--muted); }
  nav.channels .tab[data-channel="whatsapp"].active { border-color: var(--ch-whatsapp); color: var(--ch-whatsapp); }
  nav.channels .tab[data-channel="discord"].active { border-color: var(--ch-discord); color: var(--ch-discord); }
  nav.channels .tab[data-channel="teams"].active { border-color: var(--ch-teams); color: var(--ch-teams); }
  nav.channels .tab[data-channel="slack"].active { border-color: var(--ch-slack); color: var(--ch-slack); }
  main { display: grid; gap: 16px; padding: 16px 20px; align-items: start; }
  main.all-channels { grid-template-columns: 1fr; }
  /* minmax(0, 1fr) em vez de 1fr puro: o tamanho mínimo automático de uma coluna "1fr" é
     "auto", que respeita o min-content dela — um id sem espaços (Teams/Slack) tem min-content
     igual ao próprio comprimento da string, e isso sozinho já forçava a coluna a ficar mais
     larga que as outras mesmo com fr iguais. minmax(0, 1fr) zera esse mínimo automático. */
  main.single-channel { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr); }
  @media (max-width: 1100px) { main.single-channel { grid-template-columns: 1fr; } }
  section h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0 0 8px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; min-width: 0; }
  .card.highlight { border-color: var(--accent); }
  .row { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; min-width: 0; }
  .muted { color: var(--muted); font-size: 12px; }
  /* Teams/Slack têm ids 4-5x mais longos que WhatsApp/Discord — sem isso, o header do
     card quebra em 2-3 linhas e empurra tudo pra baixo. Valor completo fica no atributo
     title (tooltip) e, sempre, no bloco "detalhes + payloads" abaixo.
     row-id força nowrap: com flex-wrap:wrap (padrão de .row), o item flexível some pra uma
     "linha" própria em vez de encolher — e sem encolher, overflow/ellipsis nunca entra em ação. */
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .row.row-id { flex-wrap: nowrap; }
  .row > strong.truncate { flex: 1 1 auto; min-width: 0; }
  .card > .row > .muted { flex-shrink: 0; }
  .badge { display: inline-block; padding: 0 8px; border-radius: 10px; font-size: 11px; border: 1px solid var(--border); }
  .badge.sent { color: var(--muted); }
  .badge.delivered { color: var(--accent); border-color: var(--accent); }
  .badge.read { color: var(--ok); border-color: var(--ok); }
  .badge.failed { color: var(--err); border-color: var(--err); }
  .badge.sig-ok { color: var(--ok); border-color: var(--ok); }
  .badge.sig-bad { color: var(--err); border-color: var(--err); }
  .badge.ch-whatsapp { color: var(--ch-whatsapp); border-color: var(--ch-whatsapp); }
  .badge.ch-discord { color: var(--ch-discord); border-color: var(--ch-discord); }
  .badge.ch-teams { color: var(--ch-teams); border-color: var(--ch-teams); }
  .badge.ch-slack { color: var(--ch-slack); border-color: var(--ch-slack); }
  details { margin-top: 8px; }
  summary { cursor: pointer; color: var(--accent); font-size: 12px; }
  pre { background: #0a0d12; border: 1px solid var(--border); border-radius: 6px; padding: 8px; overflow-x: auto; font-size: 12px; margin: 6px 0; max-height: 320px; }
  .timeline { margin: 8px 0 0; padding: 0; list-style: none; }
  .timeline li { padding: 4px 0 4px 16px; border-left: 2px solid var(--border); }
  .timeline li:first-child { border-left-color: var(--accent); }
  a.wr-link { color: var(--accent); text-decoration: none; font-size: 12px; }
  a.wr-link:hover { text-decoration: underline; }
  .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; margin-top: 8px; }
  .send-trigger { padding: 0 20px 8px; }
  .send-trigger.disabled button { opacity: 0.4; pointer-events: none; }
  dialog#compose-modal { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 16px; width: min(520px, 90vw); }
  dialog#compose-modal::backdrop { background: rgba(0, 0, 0, 0.6); }
  dialog#compose-modal h2 { font-size: 14px; margin: 0 0 12px; }
  dialog#compose-modal h2 span { color: var(--accent); }
  #compose-form { display: flex; flex-direction: column; gap: 8px; }
  #compose-form input, #compose-form textarea, #compose-form select { background: #0a0d12; border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 10px; font: inherit; width: 100%; }
  #compose-form select { min-width: 0; }
  #compose-form textarea { min-height: 90px; resize: vertical; }
  #compose-form .row { align-items: center; }
  #compose-title-row[hidden] { display: none; }
  .actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
  .actions button { padding: 2px 10px; font-size: 12px; }
  .actions input { background: #0a0d12; border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 2px 8px; font: inherit; font-size: 12px; flex: 1; min-width: 120px; }
  .actions .feedback { font-size: 11px; }
  #send-result { padding: 0 20px 8px; font-size: 12px; color: var(--muted); word-break: break-all; }
  .empty { color: var(--muted); font-style: italic; padding: 8px 0; }
  .sentinel { text-align: center; padding: 12px 0; color: var(--muted); font-size: 12px; }
  .provision-panel { padding: 0 20px 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .provision-panel .row { margin-bottom: 8px; }
  .provision-panel input { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 4px 10px; font: inherit; }
  .provision-panel input#teams-app-id { min-width: 280px; }
  .provision-panel input#teams-user-filter { flex: 1; min-width: 200px; }
  .provision-panel .users-list { max-height: 360px; overflow-y: auto; }
</style>
</head>
<body>
<header>
  <h1>reflector <span>— laboratório de canais</span></h1>
  <nav class="channels" id="channel-tabs">
    <button class="tab active" data-channel="">todos</button>
    <button class="tab" data-channel="whatsapp">whatsapp</button>
    <button class="tab" data-channel="discord">discord</button>
    <button class="tab" data-channel="teams">teams</button>
    <button class="tab" data-channel="slack">slack</button>
  </nav>
  <div class="spacer"></div>
  <label class="toggle"><input type="checkbox" id="auto" checked> auto-refresh (4s)</label>
  <button id="refresh">atualizar</button>
</header>

<div class="send-trigger disabled" id="send-trigger">
  <button type="button" id="compose-open-btn" disabled>selecione um canal para enviar</button>
</div>

<dialog id="compose-modal">
  <form id="compose-form">
    <h2>Compor mensagem — <span id="compose-channel-label"></span></h2>
    <div class="row">
      <input id="to-input" name="to" placeholder="destinatário" required>
      <select id="to-select" hidden></select>
      <span class="muted" id="compose-type-badge"></span>
    </div>
    <div class="row" id="compose-title-row" hidden>
      <input id="compose-title" placeholder="título (negrito — Teams não tem campo nativo de assunto; simulado via Markdown)">
    </div>
    <textarea name="text" placeholder="mensagem de texto" required></textarea>
    <div class="row">
      <button type="submit">enviar</button>
      <button type="button" id="compose-cancel">cancelar</button>
    </div>
    <div id="send-result"></div>
  </form>
</dialog>

<section class="provision-panel" id="section-teams-provision" hidden>
  <h2>Provisionamento Teams (Microsoft Graph)</h2>
  <div class="row">
    <input id="teams-app-id" placeholder="id do app no catálogo (teamsAppId)">
    <button id="teams-load-users">carregar usuários</button>
    <input id="teams-user-filter" placeholder="filtrar por nome/e-mail/UPN…">
  </div>
  <div id="teams-users-result" class="muted"></div>
  <div id="teams-users-list" class="users-list"></div>

  <h2>Canais e conversas conhecidas</h2>
  <div class="row">
    <button id="teams-load-destinations">carregar canais/conversas</button>
  </div>
  <div id="teams-destinations-result" class="muted"></div>
  <div id="teams-destinations-list" class="users-list"></div>
</section>

<main class="all-channels" id="main">
  <section id="section-outbound" hidden>
    <h2>Enviadas (API → canal)</h2>
    <div id="outbound-fresh"></div>
    <div id="outbound-history"></div>
    <div id="outbound-sentinel" class="sentinel" hidden>↓ carregar mais</div>
  </section>
  <section id="section-inbound" hidden>
    <h2>Recebidas (canal → webhook)</h2>
    <div id="inbound-fresh"></div>
    <div id="inbound-history"></div>
    <div id="inbound-sentinel" class="sentinel" hidden>↓ carregar mais</div>
  </section>
  <section>
    <h2>Webhook requests (brutas)</h2>
    <div id="webhooks-fresh"></div>
    <div id="webhooks-history"></div>
    <div id="webhooks-sentinel" class="sentinel" hidden>↓ carregar mais</div>
  </section>
</main>

<script>
const $ = (sel) => document.querySelector(sel);

let activeChannel = ''; // '' = todos os canais

const PAGE_SIZE = 50;
const pager = {
  outbound: { minId: null, exhausted: false, loading: false },
  inbound:  { minId: null, exhausted: false, loading: false },
  webhooks: { minId: null, exhausted: false, loading: false },
};

function resetPager() {
  for (const s of Object.keys(pager)) {
    pager[s] = { minId: null, exhausted: false, loading: false };
    const h = document.getElementById(s + '-history');
    if (h) h.innerHTML = '';
  }
  updateSentinels();
}

function updateSentinels() {
  for (const s of Object.keys(pager)) {
    const el = document.getElementById(s + '-sentinel');
    if (!el) continue;
    el.hidden = pager[s].exhausted || pager[s].minId === null;
    if (!el.hidden && !pager[s].loading) el.textContent = '↓ carregar mais';
  }
}

async function loadMore(section) {
  const state = pager[section];
  if (state.loading || state.exhausted || state.minId === null) return;
  state.loading = true;
  const sentinel = document.getElementById(section + '-sentinel');
  if (sentinel) sentinel.textContent = 'carregando…';
  try {
    const qs = '?before=' + state.minId + '&limit=' + PAGE_SIZE;
    const histEl = document.getElementById(section + '-history');
    let html = '';
    let raw = [];
    if (section === 'outbound') {
      const messages = await fetchJson('/api/messages/outbound' + qs);
      raw = messages;
      const filtered = activeChannel ? messages.filter((m) => m.channel === activeChannel) : messages;
      const timelines = {};
      await Promise.all(filtered.map(async (m) => {
        try {
          timelines[m.providerMessageId] =
            await fetchJson('/api/messages/' + encodeURIComponent(m.providerMessageId) + '/timeline');
        } catch { /**/ }
      }));
      html = filtered.length ? renderOutbound(filtered, timelines) : '';
    } else if (section === 'inbound') {
      const messages = await fetchJson('/api/messages/inbound' + qs);
      raw = messages;
      const filtered = activeChannel ? messages.filter((m) => m.channel === activeChannel) : messages;
      html = filtered.length ? renderInbound(filtered) : '';
    } else {
      const requests = await fetchJson('/api/webhook-requests' + qs);
      raw = requests;
      const filtered = activeChannel ? requests.filter((r) => r.channel === activeChannel) : requests;
      html = filtered.length ? renderWebhooks(filtered) : '';
    }
    if (raw.length) state.minId = Math.min(...raw.map((r) => r.id));
    if (raw.length < PAGE_SIZE) state.exhausted = true;
    if (html && histEl) histEl.insertAdjacentHTML('beforeend', html);
  } catch (err) {
    console.error('loadMore', section, err);
  } finally {
    state.loading = false;
    updateSentinels();
  }
}

function esc(value) {
  return String(value).replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function pretty(value) {
  if (typeof value === 'string') {
    try { value = JSON.parse(value); } catch { /* mantém como string */ }
  }
  return esc(JSON.stringify(value, null, 2));
}

function fmtDate(iso) {
  return iso ? new Date(iso).toLocaleString('pt-BR') : '';
}

function contentSummary(content) {
  if (!content || !content.kind) return '(sem conteúdo)';
  if (content.kind === 'text') return '"' + content.text + '"';
  if (content.kind === 'template') return 'template: ' + content.name;
  if (content.kind === 'media') return 'mídia: ' + content.mediaType;
  if (content.kind === 'reaction') return 'reação: ' + (content.emoji || '(removida)');
  if (content.kind === 'choice') return 'escolha [' + content.source + ']: ' + content.label;
  if (content.kind === 'location') return 'localização: ' + content.latitude + ', ' + content.longitude;
  if (content.kind === 'contacts') return 'contatos (' + content.contacts.length + ')';
  if (content.kind === 'unsupported') return 'não suportado: ' + content.nativeType;
  return content.kind;
}

function wrLink(id) {
  return '<a class="wr-link" href="#wr-' + id + '" data-wr="' + id + '">request #' + id + '</a>';
}

function statusBadge(status) {
  return '<span class="badge ' + esc(status) + '">' + esc(status) + '</span>';
}

function channelBadge(channel) {
  return '<span class="badge ch-' + esc(channel) + '">' + esc(channel) + '</span>';
}

// preserva <details> abertos entre re-renders
function openKeys() {
  return new Set([...document.querySelectorAll('details[open][data-key]')].map((d) => d.dataset.key));
}
function restoreOpen(keys) {
  for (const d of document.querySelectorAll('details[data-key]')) {
    if (keys.has(d.dataset.key)) d.open = true;
  }
}

async function fetchJson(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(url + ' → ' + res.status);
  return res.json();
}

async function loadDestinations(channel) {
  const select = $('#to-select');
  select.innerHTML = '<option value="">carregando canais…</option>';
  try {
    const destinations = await fetchJson('/api/' + channel + '/destinations');
    select.innerHTML = '';
    // Agrupa por guild usando <optgroup>
    const groups = {};
    for (const d of destinations) {
      const g = d.group ?? '';
      if (!groups[g]) groups[g] = [];
      groups[g].push(d);
    }
    for (const [groupName, items] of Object.entries(groups)) {
      const grp = document.createElement('optgroup');
      grp.label = groupName;
      for (const item of items) {
        const opt = document.createElement('option');
        opt.value = item.id;
        opt.textContent = item.label;
        grp.appendChild(opt);
      }
      select.appendChild(grp);
    }
    if (!select.options.length) {
      select.innerHTML = '<option value="">(nenhum canal encontrado)</option>';
    }
  } catch {
    select.innerHTML = '<option value="">(erro ao carregar canais)</option>';
  }
}

function updateUI() {
  const main = $('#main');
  const sendTrigger = $('#send-trigger');
  const openBtn = $('#compose-open-btn');
  const toInput = $('#to-input');
  const toSelect = $('#to-select');

  // Limpa o destinatário ao trocar de canal/aba — sem isso, um id deixado por um envio
  // anterior (ex.: de "abrir DM") permanece no campo e pode receber o próximo envio por engano
  toInput.value = '';
  $('#send-result').textContent = '';

  if (activeChannel) {
    main.className = 'single-channel';
    $('#section-outbound').hidden = false;
    $('#section-inbound').hidden = false;
    sendTrigger.classList.remove('disabled');
    openBtn.disabled = false;
    openBtn.textContent = 'compor mensagem via ' + activeChannel;

    // Canais com seletor de destino mostram <select>; outros mostram <input>
    // Discord e Slack têm listagem de canais via API com <select>; WhatsApp usa destinatário livre.
    // Teams também lista canais/conversas via API, mas pelo painel de provisionamento
    // (botão "usar como destinatário" preenche o <input>) — ver #section-teams-provision —
    // porque o mesmo <input> já é usado pelo fluxo de abrir DM.
    const hasDestinations = activeChannel === 'discord' || activeChannel === 'slack';
    toInput.hidden = hasDestinations;
    toInput.required = !hasDestinations;
    toSelect.hidden = !hasDestinations;
    if (hasDestinations) loadDestinations(activeChannel);
  } else {
    main.className = 'all-channels';
    $('#section-outbound').hidden = true;
    $('#section-inbound').hidden = true;
    sendTrigger.classList.add('disabled');
    openBtn.disabled = true;
    openBtn.textContent = 'selecione um canal para enviar';
    toInput.hidden = false;
    toInput.required = true;
    toSelect.hidden = true;
  }

  $('#section-teams-provision').hidden = activeChannel !== 'teams';
}

$('#channel-tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  activeChannel = tab.dataset.channel;
  document.querySelectorAll('#channel-tabs .tab').forEach((t) => t.classList.toggle('active', t === tab));
  updateUI();
  resetPager();
  load();
});

// Simula um "assunto" em negrito via Markdown — único formato que o Teams renderiza
// destacado num canal (a Connector API não tem campo de assunto nativo). Usado tanto ao
// compor quanto ao corrigir/editar, para o resultado final ficar no mesmo formato.
function withTitle(title, text) {
  return title ? '**' + title + '**\n\n' + text : text;
}

// Reply chain de canal do Teams tem conversationId com prefixo "19:" (ver docs/learnings.md);
// DM/grupo usa "a:". Só em canal confirmamos que o negrito do título acima realmente renderiza.
function isTeamsChannelMessage(m) {
  return m.channel === 'teams' && m.providerMessageId.split('|')[0].startsWith('19:');
}

function renderOutbound(messages, timelines) {
  if (!messages.length) return '<div class="empty">nenhuma mensagem enviada ainda</div>';
  return messages.map((m) => {
    const timeline = timelines[m.providerMessageId];
    const statuses = timeline ? timeline.statuses : [];
    const chain = statuses.length
      ? statuses.map((s) => statusBadge(s.status)).join(' ')
      : '<span class="muted">aguardando status…</span>';
    const isDiscord = m.channel === 'discord';
    const isTeamsChannel = isTeamsChannelMessage(m);
    return '<div class="card">' +
      '<div class="row row-id"><strong class="truncate" title="' + esc(m.recipient) + '">→ ' + esc(m.recipient) + '</strong>' +
      '<span class="muted">' + fmtDate(m.sentAt) + '</span></div>' +
      '<div class="row">' + esc(contentSummary(m.content)) + '</div>' +
      '<div class="row">' + chain + '</div>' +
      '<div class="actions" data-wamid="' + esc(m.providerMessageId) + '" data-channel="' + esc(m.channel) + '">' +
      (isDiscord
        ? '<input data-role="edit-text" placeholder="editar conteúdo…">' +
          '<button data-action="edit">editar</button>' +
          '<button data-action="delete">deletar</button>'
        : (isTeamsChannel ? '<input data-role="correct-title" placeholder="título (negrito, opcional)">' : '') +
          '<input data-role="correct-text" placeholder="texto corrigido…">' +
          '<button data-action="correct">' + (isTeamsChannel ? 'corrigir' : 'corrigir (⚠️ + reply)') + '</button>') +
      '<span class="muted feedback"></span>' +
      '</div>' +
      '<details data-key="out-' + m.id + '"><summary>detalhes + payloads</summary>' +
      '<div class="label">wamid</div><pre>' + esc(m.providerMessageId) + '</pre>' +
      '<div class="label">conteúdo enviado</div><pre>' + pretty(m.content) + '</pre>' +
      '<div class="label">resposta da API</div><pre>' + pretty(m.apiResponse) + '</pre>' +
      '<div class="label">timeline de status</div>' +
      (statuses.length
        ? '<ul class="timeline">' + statuses.map((s) =>
            '<li>' + statusBadge(s.status) + ' <span class="muted">' + fmtDate(s.occurredAt) + '</span> ' +
            wrLink(s.webhookRequestId) +
            (s.error ? '<pre>' + pretty(s.error) + '</pre>' : '') +
            '</li>').join('') + '</ul>'
        : '<div class="muted">nenhum status recebido</div>') +
      renderInteractions('reações', timeline ? timeline.reactions : []) +
      renderInteractions('respostas (replies)', timeline ? timeline.replies : []) +
      renderOutboundRefs('reações enviadas por nós', timeline ? timeline.outboundReactions : []) +
      renderOutboundRefs('correções enviadas (replies nossos)', timeline ? timeline.outboundReplies : []) +
      '</details></div>';
  }).join('');
}

function renderInteractions(title, items) {
  if (!items || !items.length) return '';
  return '<div class="label">' + esc(title) + '</div><ul class="timeline">' +
    items.map((m) =>
      '<li>← <strong>' + esc(m.sender) + '</strong> ' + esc(contentSummary(m.content)) +
      ' <span class="muted">' + fmtDate(m.receivedAt) + '</span> ' + wrLink(m.webhookRequestId) + '</li>'
    ).join('') + '</ul>';
}

function renderOutboundRefs(title, items) {
  if (!items || !items.length) return '';
  return '<div class="label">' + esc(title) + '</div><ul class="timeline">' +
    items.map((m) =>
      '<li>→ ' + esc(contentSummary(m.content)) +
      ' <span class="muted">' + fmtDate(m.sentAt) + '</span></li>'
    ).join('') + '</ul>';
}

function renderInbound(messages) {
  if (!messages.length) return '<div class="empty">nenhuma mensagem recebida ainda</div>';
  return messages.map((m) => {
    const isDiscord = m.channel === 'discord';
    const isTeams = m.channel === 'teams';
    // Para Discord: `to` de reply é o channelId (parte antes do ':' no providerMessageId)
    // Para Teams: `to` de reply é o conversationId (parte antes do '|' no providerMessageId) —
    // `sender` é o id do usuário (29:xxx), que não é um conversationId válido para POST /v3/conversations/:id/activities
    // Para WhatsApp/Slack: `to` de reply é o sender
    const replyTo = isDiscord
      ? m.providerMessageId.split(':')[0]
      : isTeams
        ? m.providerMessageId.split('|')[0]
        : m.sender;
    return '<div class="card">' +
    '<div class="row row-id"><strong class="truncate" title="' + esc(m.sender) + '">← ' + esc(m.sender) + '</strong>' +
    '<span class="muted">' + fmtDate(m.receivedAt) + '</span></div>' +
    '<div class="row">' + esc(contentSummary(m.content)) + '</div>' +
    (m.replyTo ? '<div class="row muted">↩ reply para ' + esc(m.replyTo.slice(0, 24)) + '…</div>' : '') +
    '<div class="row">' + wrLink(m.webhookRequestId) + '</div>' +
    '<div class="actions" data-wamid="' + esc(m.providerMessageId) + '" data-sender="' + esc(m.sender) + '" data-channel="' + esc(m.channel) + '" data-to="' + esc(replyTo) + '">' +
    (isDiscord ? '' : '<button data-action="read">marcar lida</button>') +
    '<button data-action="react">reagir 👍</button>' +
    '<input data-role="reply-text" placeholder="responder citando…">' +
    '<button data-action="reply">responder</button>' +
    '<span class="muted feedback"></span>' +
    '</div>' +
    '<details data-key="in-' + m.id + '"><summary>detalhes + payloads</summary>' +
    '<div class="label">wamid</div><pre>' + esc(m.providerMessageId) + '</pre>' +
    '<div class="label">conteúdo traduzido (core)</div><pre>' + pretty(m.content) + '</pre>' +
    '<div class="label">payload nativo (raw)</div><pre>' + pretty(m.raw) + '</pre>' +
    '</details></div>';
  }).join('');
}

function renderWebhooks(requests) {
  if (!requests.length) return '<div class="empty">nenhuma request recebida ainda</div>';
  return requests.map((r) =>
    '<div class="card" id="wr-' + r.id + '">' +
    '<div class="row"><strong>#' + r.id + '</strong>' +
    channelBadge(r.channel) +
    '<span class="badge ' + (r.signatureValid ? 'sig-ok">assinatura ok' : 'sig-bad">assinatura inválida') + '</span>' +
    '<span class="muted">' + fmtDate(r.receivedAt) + '</span></div>' +
    '<details data-key="wr-' + r.id + '"><summary>headers + corpo bruto</summary>' +
    '<div class="label">headers</div><pre>' + pretty(r.headers) + '</pre>' +
    '<div class="label">corpo bruto</div><pre>' + pretty(r.body) + '</pre>' +
    '</details></div>'
  ).join('');
}

// ── Provisionamento Teams (Microsoft Graph) ─────────────────────────────────

let teamsUsersCache = [];

function renderTeamsUsers(users, filter) {
  const f = (filter || '').trim().toLowerCase();
  const filtered = f
    ? users.filter((u) =>
        (u.displayName || '').toLowerCase().includes(f) ||
        (u.mail || '').toLowerCase().includes(f) ||
        (u.userPrincipalName || '').toLowerCase().includes(f) ||
        u.id.toLowerCase().includes(f))
    : users;
  if (!filtered.length) return '<div class="empty">nenhum usuário encontrado</div>';
  return filtered.map((u) =>
    '<div class="card">' +
    '<div class="row"><strong>' + esc(u.displayName || '(sem nome)') + '</strong>' +
    '<span class="muted">' + esc(u.userPrincipalName || u.mail || '') + '</span></div>' +
    '<div class="row muted">' + esc(u.id) + '</div>' +
    '<div class="actions" data-user-id="' + esc(u.id) + '" data-user-label="' + esc(u.displayName || u.id) + '">' +
    '<button data-action="install-app">instalar app aqui</button>' +
    '<button data-action="open-dm">abrir DM e usar como destinatário</button>' +
    '<span class="muted feedback"></span>' +
    '</div></div>'
  ).join('');
}

$('#teams-load-users').addEventListener('click', async () => {
  const resultEl = $('#teams-users-result');
  resultEl.textContent = 'carregando…';
  try {
    teamsUsersCache = await fetchJson('/api/teams/users');
    resultEl.textContent = teamsUsersCache.length + ' usuários carregados';
    $('#teams-users-list').innerHTML = renderTeamsUsers(teamsUsersCache, $('#teams-user-filter').value);
  } catch (error) {
    resultEl.textContent = 'erro ao carregar: ' + error.message;
  }
});

$('#teams-user-filter').addEventListener('input', () => {
  $('#teams-users-list').innerHTML = renderTeamsUsers(teamsUsersCache, $('#teams-user-filter').value);
});

$('#teams-users-list').addEventListener('click', async (event) => {
  const button = event.target.closest('.actions button[data-action]');
  if (!button) return;
  // evita que o listener genérico de ações de mensagem (document, mais abaixo) também trate este clique —
  // ambos usam a classe .actions para reaproveitar o estilo, mas são handlers independentes
  event.stopPropagation();
  const actions = button.closest('.actions');
  const userId = actions.dataset.userId;
  const userLabel = actions.dataset.userLabel;
  const feedback = actions.querySelector('.feedback');

  if (button.dataset.action === 'install-app') {
    const appId = $('#teams-app-id').value.trim();
    if (!appId) { feedback.textContent = 'informe o id do app no catálogo acima'; return; }
    if (!confirm('Instalar o app "' + appId + '" para ' + userLabel + '?')) return;

    feedback.textContent = 'instalando…';
    try {
      const res = await fetch('/api/teams/install', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ userId, appId }),
      });
      const data = await res.json().catch(() => ({}));
      feedback.textContent = res.ok ? 'instalado ✓' : 'erro ' + res.status + ': ' + JSON.stringify(data);
    } catch (error) {
      feedback.textContent = 'falha: ' + error.message;
    }
    return;
  }

  if (button.dataset.action === 'open-dm') {
    feedback.textContent = 'abrindo DM…';
    try {
      const res = await fetch('/api/teams/dm', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ userId }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        feedback.textContent = 'erro ' + res.status + ': ' + JSON.stringify(data);
        return;
      }
      $('#to-input').value = data.channelId;
      feedback.textContent = 'DM aberta ✓ — clique em "compor mensagem" para enviar';
    } catch (error) {
      feedback.textContent = 'falha: ' + error.message;
    }
  }
});

function renderTeamsDestinations(destinations) {
  if (!destinations.length) return '<div class="empty">nenhum canal/conversa conhecido — @mencione o bot num canal, ou abra uma DM acima</div>';
  const groups = {};
  for (const d of destinations) {
    const g = d.group ?? '';
    if (!groups[g]) groups[g] = [];
    groups[g].push(d);
  }
  return Object.entries(groups).map(([groupName, items]) =>
    '<div class="label">' + esc(groupName) + '</div>' +
    items.map((d) =>
      '<div class="card">' +
      '<div class="row"><strong>' + esc(d.label) + '</strong></div>' +
      '<div class="muted truncate" title="' + esc(d.id) + '">' + esc(d.id) + '</div>' +
      '<div class="actions" data-destination-id="' + esc(d.id) + '">' +
      '<button data-action="use-destination">usar como destinatário</button>' +
      (d.id.startsWith('channel:')
        ? '<button data-action="subscribe-channel">ativar captura de replies (sem @menção)</button>'
        : '') +
      '<span class="muted feedback"></span>' +
      '</div></div>'
    ).join('')
  ).join('');
}

$('#teams-load-destinations').addEventListener('click', async () => {
  const resultEl = $('#teams-destinations-result');
  resultEl.textContent = 'carregando…';
  try {
    const destinations = await fetchJson('/api/teams/destinations');
    resultEl.textContent = destinations.length + ' destinos conhecidos';
    $('#teams-destinations-list').innerHTML = renderTeamsDestinations(destinations);
  } catch (error) {
    resultEl.textContent = 'erro ao carregar: ' + error.message;
  }
});

$('#teams-destinations-list').addEventListener('click', async (event) => {
  const button = event.target.closest('.actions button[data-action]');
  if (!button) return;
  event.stopPropagation();
  const actions = button.closest('.actions');
  const destinationId = actions.dataset.destinationId;
  const feedback = actions.querySelector('.feedback');

  if (button.dataset.action === 'use-destination') {
    $('#to-input').value = destinationId;
    feedback.textContent = 'preenchido ✓ — clique em "compor mensagem" para enviar';
    return;
  }

  if (button.dataset.action === 'subscribe-channel') {
    feedback.textContent = 'ativando…';
    try {
      const res = await fetch('/api/teams/channel-subscriptions', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ destinationId }),
      });
      const data = await res.json().catch(() => ({}));
      feedback.textContent = res.ok
        ? 'ativado ✓ — expira ' + fmtDate(data.expirationDateTime)
        : 'erro ' + res.status + ': ' + JSON.stringify(data);
    } catch (error) {
      feedback.textContent = 'falha: ' + error.message;
    }
  }
});

function typingReply() {
  const active = document.activeElement;
  return active && active.dataset && /-text$/.test(active.dataset.role || '');
}

async function load() {
  if (typingReply()) return;
  try {
    const [outbound, inbound, webhooks] = await Promise.all([
      fetchJson('/api/messages/outbound'),
      fetchJson('/api/messages/inbound'),
      fetchJson('/api/webhook-requests'),
    ]);

    const filteredOutbound = activeChannel ? outbound.filter((m) => m.channel === activeChannel) : outbound;
    const filteredInbound = activeChannel ? inbound.filter((m) => m.channel === activeChannel) : inbound;
    const filteredWebhooks = activeChannel ? webhooks.filter((r) => r.channel === activeChannel) : webhooks;

    const timelines = {};
    await Promise.all(filteredOutbound.map(async (m) => {
      try {
        timelines[m.providerMessageId] =
          await fetchJson('/api/messages/' + encodeURIComponent(m.providerMessageId) + '/timeline');
      } catch { /* envio sem timeline ainda */ }
    }));

    const keys = openKeys();
    $('#outbound-fresh').innerHTML = renderOutbound(filteredOutbound, timelines);
    $('#inbound-fresh').innerHTML = renderInbound(filteredInbound);
    $('#webhooks-fresh').innerHTML = renderWebhooks(filteredWebhooks);
    restoreOpen(keys);

    if (outbound.length && pager.outbound.minId === null) {
      pager.outbound.minId = Math.min(...outbound.map((m) => m.id));
      if (outbound.length < PAGE_SIZE) pager.outbound.exhausted = true;
    }
    if (inbound.length && pager.inbound.minId === null) {
      pager.inbound.minId = Math.min(...inbound.map((m) => m.id));
      if (inbound.length < PAGE_SIZE) pager.inbound.exhausted = true;
    }
    if (webhooks.length && pager.webhooks.minId === null) {
      pager.webhooks.minId = Math.min(...webhooks.map((r) => r.id));
      if (webhooks.length < PAGE_SIZE) pager.webhooks.exhausted = true;
    }
    updateSentinels();
  } catch (error) {
    console.error(error);
  }
}

// clique em "request #N" abre e destaca a request bruta correspondente
document.addEventListener('click', (event) => {
  const link = event.target.closest('a.wr-link');
  if (!link) return;
  const card = document.getElementById('wr-' + link.dataset.wr);
  if (!card) return;
  event.preventDefault();
  card.querySelector('details').open = true;
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  card.classList.add('highlight');
  setTimeout(() => card.classList.remove('highlight'), 2000);
});

// ações de devolução sobre uma mensagem: marcar lida, reagir, responder, corrigir, editar, deletar
document.addEventListener('click', async (event) => {
  const button = event.target.closest('.actions button[data-action]');
  if (!button) return;
  const actions = button.closest('.actions');
  const wamid = actions.dataset.wamid;
  const sender = actions.dataset.sender;
  const channel = actions.dataset.channel;
  // `to` para reply: channelId no Discord, sender no WhatsApp (pré-computado no render)
  const to = actions.dataset.to ?? sender;
  const feedback = actions.querySelector('.feedback');

  const calls = {
    read: () => fetch('/api/' + channel + '/messages/' + encodeURIComponent(wamid) + '/read', { method: 'POST' }),
    react: () => fetch('/api/' + channel + '/send', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ to, content: { kind: 'reaction', targetMessageId: wamid, emoji: '👍' } }),
    }),
    reply: () => {
      const text = actions.querySelector('[data-role=reply-text]').value.trim();
      if (!text) return Promise.reject(new Error('digite o texto da resposta'));
      return fetch('/api/' + channel + '/send', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ to, content: { kind: 'text', text }, replyTo: wamid }),
      });
    },
    correct: () => {
      const text = actions.querySelector('[data-role=correct-text]').value.trim();
      if (!text) return Promise.reject(new Error('digite o texto corrigido'));
      const titleEl = actions.querySelector('[data-role=correct-title]');
      const body = withTitle(titleEl ? titleEl.value.trim() : '', text);
      return fetch('/api/' + channel + '/messages/' + encodeURIComponent(wamid) + '/correct', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ text: body }),
      });
    },
    edit: () => {
      const text = actions.querySelector('[data-role=edit-text]').value.trim();
      if (!text) return Promise.reject(new Error('digite o texto editado'));
      return fetch('/api/' + channel + '/messages/' + encodeURIComponent(wamid), {
        method: 'PATCH',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ text }),
      });
    },
    delete: () => fetch('/api/' + channel + '/messages/' + encodeURIComponent(wamid), { method: 'DELETE' }),
  };

  feedback.textContent = '…';
  try {
    const res = await calls[button.dataset.action]();
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(res.status + ' ' + JSON.stringify(data));
    }
    feedback.textContent = 'ok ✓';
    setTimeout(load, 800);
  } catch (error) {
    feedback.textContent = 'erro: ' + error.message;
  }
});

function currentTo() {
  return $('#to-select').hidden ? $('#to-input').value.trim() : $('#to-select').value;
}

/**
 * "Tipo" do destinatário (individual vs canal), detectado pelo prefixo sintético do
 * próprio id — `dm:` no Discord, `channel:` no Teams (ver docs/learnings.md). Slack e
 * WhatsApp não têm um sinal confiável nesse id sozinho, então ficam sem badge.
 */
function detectDestinationType(channel, to) {
  if (!to) return null;
  if (channel === 'teams') return to.startsWith('channel:') ? 'canal' : 'individual';
  if (channel === 'discord') return to.startsWith('dm:') ? 'individual' : 'canal';
  return null;
}

function refreshComposeFields() {
  const to = currentTo();
  const type = detectDestinationType(activeChannel, to);
  $('#compose-type-badge').textContent = type ? '(' + type + ')' : '';
  // Título é só um recurso visual do dashboard (negrito via Markdown) — Teams não tem
  // campo de "assunto" nativo na Connector API, então só faz sentido oferecer o campo
  // quando o destino é mesmo um canal do Teams, onde confirmamos que renderiza negrito.
  $('#compose-title-row').hidden = !(activeChannel === 'teams' && type === 'canal');
}

$('#compose-open-btn').addEventListener('click', () => {
  $('#compose-channel-label').textContent = activeChannel;
  $('#send-result').textContent = '';
  refreshComposeFields();
  $('#compose-modal').showModal();
});

$('#compose-cancel').addEventListener('click', () => $('#compose-modal').close());
$('#to-input').addEventListener('input', refreshComposeFields);
$('#to-select').addEventListener('change', refreshComposeFields);

$('#compose-form').addEventListener('submit', async (event) => {
  event.preventDefault();
  if (!activeChannel) return;
  const form = new FormData(event.target);
  const to = currentTo();
  if (!to) { $('#send-result').textContent = 'selecione um canal de destino'; return; }

  const title = $('#compose-title-row').hidden ? '' : $('#compose-title').value.trim();
  const text = withTitle(title, form.get('text'));

  const result = $('#send-result');
  result.textContent = 'enviando…';
  try {
    const res = await fetch('/api/' + activeChannel + '/send', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        to,
        content: { kind: 'text', text },
      }),
    });
    const data = await res.json();
    result.textContent = res.ok
      ? 'enviado para ' + to + ' — ' + data.providerMessageId
      : 'erro ' + res.status + ' (destinatário: ' + to + ') — ' + JSON.stringify(data);
    if (res.ok) {
      $('#compose-title').value = '';
      event.target.querySelector('textarea[name=text]').value = '';
      $('#compose-modal').close();
      load();
    }
  } catch (error) {
    result.textContent = 'falha: ' + error.message;
  }
});

const _observer = new IntersectionObserver((entries) => {
  for (const entry of entries) {
    if (!entry.isIntersecting) continue;
    loadMore(entry.target.id.replace('-sentinel', ''));
  }
}, { rootMargin: '100px' });
for (const s of ['outbound', 'inbound', 'webhooks']) {
  _observer.observe(document.getElementById(s + '-sentinel'));
}

$('#refresh').addEventListener('click', load);
setInterval(() => { if ($('#auto').checked) load(); }, 4000);
updateUI();
load();
</script>
